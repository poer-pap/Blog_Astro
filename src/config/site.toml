[config.site]
title = "Litelog"
description = "A personal navigation portfolio starter built with Astro."
pageTitle = "Litelog | Digital Publication Space"
pageDescription = "A calm AI-native personal publication space for notes, links, and writing."
repository = "https://github.com/poer-pap/Blog_Astro"
footerNote = "Released as an open-source starter."

[config.vibe]
showTrail = true

[config.theme]
# Available palettes:
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "blue-soft"

[config.code]
lightTheme = "catppuccin-latte"
darkTheme = "catppuccin-macchiato"
lineNumbers = true
wrap = true
preserveIndent = true
collapseStyle = "collapsible-auto"

[config.comments]
enabled = true
provider = "giscus"
show_on_posts = true

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "Search notes..."
maxResults = 6

[config.blog]
postsPerPage = 6

[config.comments.giscus]
repo = "dodolalorc/astro-navfolio"
repo_id = "R_kgDOSaQejw"
category = "Announcements"
category_id = "DIC_kwDOSaQej84C9di9"
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
light_theme = "light"
dark_theme = "dark"
lang = "zh-CN"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "zh-CN"
dark = "html.dark"
pageview = true
comment = true

[config.profile]
name = "JJLiu Blog"
handle = "Litelog"
role = "Developer"
company = "Independent Studio"
location = "Remote"
email = "hello@navfolio.site"
website = "https://astro.navfolio.site/"
github = "https://github.com/poer-pap/Blog_Astro"
meta = "Open-source maintainer"
avatar = "/images/logo.png"

[[config.topNav.links]]
label = "Home"
href = "/"

[[config.topNav.links]]
label = "Blog"
href = "/blog"

[[config.topNav.links]]
label = "Projects"
href = "/projects"

[[config.topNav.links]]
label = "Vibe"
href = "/vibe"


[config.home]
layout = "grid"

[config.home.quote]
text = [
  "Navigate your world,",
  "Showcase your story,",
  "and keep everything in one place.",
]
image = "/images/logo-with-name.png"

[config.home.intro]
title = "here is "
name = "LiteLog"
body = [
  "This is my personal space for documenting technical learning, project experiments, and tool experiences.",
  "I organize notes on AI, coding, product thinking, and everyday reflections into a continuously evolving archive.",
  "It is more than a portfolio — it is my knowledge base, creative lab, and long-term publishing home.",
]
image = "/images/logo-cat.png"

[config.home.latest]
count = 1
heatmapWeeks = 24
showHeatmapLatest = true
excludeDraft = true
startDate = ""
dateArchiveBaseHref = ""

[[config.home.navigation]]
icon = "pen"
title = "Blog"
subtitle = "Essays, notes, and field reports"
href = "/blog"

[[config.home.navigation]]
icon = "compass"
title = "Projects"
subtitle = "Selected work and case studies"
href = "/projects"


[[config.home.navigation]]
icon = "github"
title = "Open Source"
subtitle = "Code, experiments, and tools"
href = "https://github.com/poer-pap/Blog_Astro"

[[config.home.connect]]
label = "GitHub"
href = "https://github.com/poer-pap/Blog_Astro"
icon = "github"

[[config.home.connect]]
label = "Website"
href = "https://astro.navfolio.site/"
icon = "compass"

[[config.home.connect]]
label = "Blog"
href = "/blog"
icon = "book"

[[config.home.connect]]
label = "Projects"
href = "/projects"
icon = "repo"

[[config.home.connect]]
label = "Email"
href = "mailto:hello@navfolio.site"
icon = "mail"

[[config.home.doing]]
text = "Learning AI tools and building practical workflows"
mark = "01"

[[config.home.doing]]
text = "Documenting coding experiments and project notes"
mark = "02"

[[config.home.doing]]
text = "Improving my personal blog and publishing system"
mark = "03"

[[config.home.doing]]
text = "Collecting useful resources for developers and creators"
mark = "04"

[[config.home.doing]]
text = "Turning small ideas into visible digital products"
mark = "05"
